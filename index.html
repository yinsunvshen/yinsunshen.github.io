<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>· AMBER PALACE · 养肥诗诗菜单</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0806;
            color: #e8e0d5;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* ===== 粒子背景 ===== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== 主应用 ===== */
        .app {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(ellipse at 30% 20%, #1e1712 0%, #0a0806 80%);
            overflow: hidden;
        }

        /* ===== 顶部导航 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 10px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(201, 169, 110, 0.15);
            z-index: 10;
        }

        .header-brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .header-brand h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            letter-spacing: 6px;
            color: #f5eedc;
            text-shadow: 0 0 30px rgba(201, 169, 110, 0.1);
        }
        .header-brand h1 span {
            color: #c9a96e;
            font-style: italic;
        }
        .header-brand .est {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #6b5f4e;
            border: 1px solid rgba(201, 169, 110, 0.3);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 300;
        }

        .header-cart {
            position: relative;
            cursor: pointer;
            font-size: 1.6rem;
            color: #c9a96e;
            transition: transform 0.3s ease;
            padding: 8px;
        }
        .header-cart:hover { transform: scale(1.1); }

        .cart-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #b8863d;
            color: #0a0806;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.5);
            border: 2px solid #0a0806;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cart-badge.pop { animation: popBadge 0.4s ease; }
        @keyframes popBadge {
            0% { transform: scale(1); }
            50% { transform: scale(1.6); }
            100% { transform: scale(1); }
        }

        /* ===== 纵向滚动内容区 ===== */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 20px 30px;
            scroll-behavior: smooth;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* ===== 每个分类区块 ===== */
        .category-section {
            margin-bottom: 40px;
        }

        .category-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 10px 4px 16px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
            margin-bottom: 16px;
        }
        .category-title h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: #c9a96e;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .category-title .en-sub {
            font-style: italic;
            color: #6b5f4e;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== 轮播容器（每个分类） ===== */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(201, 169, 110, 0.08);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 菜品卡片（显示在轮播中） ===== */
        .menu-item {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 25, 20, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px 24px 28px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        .menu-item:hover {
            border-color: #c9a96e;
            box-shadow: 0 30px 60px -15px rgba(201, 169, 110, 0.2), 0 0 0 1px rgba(201, 169, 110, 0.2) inset;
            transform: translateY(-4px);
        }

        .item-image {
            width: 100%;
            padding-bottom: 66%; /* 3:2比例 */
            border-radius: 16px;
            margin-bottom: 18px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .item-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 215, 150, 0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .img-1 { background: radial-gradient(circle at 20% 30%, #f3d5b5, #6b3f2b); }
        .img-2 { background: radial-gradient(circle at 80% 20%, #e8c9a0, #3d2b1c); }
        .img-3 { background: radial-gradient(circle at 40% 70%, #d99c6b, #5e2c1a); }
        .img-4 { background: radial-gradient(circle at 60% 40%, #b83b2c, #2d0e0a); }
        .img-5 { background: radial-gradient(circle at 30% 80%, #c49a7a, #3e281b); }
        .img-6 { background: radial-gradient(circle at 70% 60%, #e3b48c, #4d2f1a); }
        .img-7 { background: radial-gradient(circle at 50% 30%, #f5e3c7, #8b7355); }
        .img-8 { background: radial-gradient(circle at 20% 70%, #c0392b, #3b1410); }
        .img-9 { background: radial-gradient(circle at 80% 80%, #dbb07c, #5c3f24); }
        .img-10 { background: radial-gradient(circle at 50% 50%, #b8a18a, #3b3228); }

        .item-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #f0ebe0;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .item-name .en {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 0.9rem;
            color: #8f8170;
            margin-top: 2px;
        }
        .item-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #c9a96e;
            white-space: nowrap;
            margin-left: 12px;
        }
        .item-desc {
            font-size: 0.95rem;
            color: #9a8d7d;
            margin: 10px 0 20px;
            line-height: 1.6;
            font-weight: 300;
            border-left: 2px solid rgba(201, 169, 110, 0.2);
            padding-left: 14px;
        }

        .item-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .add-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.5);
            background: rgba(201, 169, 110, 0.05);
            color: #c9a96e;
            font-size: 2rem;
            font-weight: 200;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            backdrop-filter: blur(4px);
        }
        .add-btn:hover {
            background: #c9a96e;
            color: #0a0806;
            box-shadow: 0 0 40px rgba(201, 169, 110, 0.3);
            transform: rotate(90deg) scale(1.05);
        }
        .add-btn:active { transform: scale(0.8) !important; }

        /* ===== 轮播指示点和箭头 ===== */
        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 16px 0 8px;
        }

        .carousel-dots {
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(201, 169, 110, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .dot.active {
            background: #c9a96e;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.5);
            transform: scale(1.3);
            border-color: #c9a96e;
        }

        .carousel-arrow {
            background: rgba(10, 8, 6, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(201, 169, 110, 0.2);
            color: #c9a96e;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-arrow:hover {
            background: #c9a96e;
            color: #0a0806;
            box-shadow: 0 0 25px rgba(201, 169, 110, 0.2);
        }
        .carousel-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ===== Toast 通知 ===== */
        .toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(10, 8, 6, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(201, 169, 110, 0.3);
            padding: 12px 32px;
            border-radius: 60px;
            color: #f5eedc;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast span { color: #c9a96e; font-weight: 700; }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .header { padding: 14px 16px 8px; }
            .header-brand .est { display: none; }
            .scroll-container { padding: 8px 12px 20px; }
            .menu-item { padding: 18px; }
            .item-image { padding-bottom: 70%; }
            .item-name { font-size: 1.2rem; }
            .item-price { font-size: 1.3rem; }
            .item-desc { font-size: 0.85rem; }
            .add-btn { width: 42px; height: 42px; font-size: 1.6rem; }
            .carousel-arrow { width: 34px; height: 34px; font-size: 1.2rem; }
            .toast { font-size: 0.9rem; padding: 8px 18px; white-space: normal; top: 80px; }
        }

        @media (max-width: 420px) {
            .menu-item { padding: 14px; }
            .item-image { padding-bottom: 75%; }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 主应用 -->
    <div class="app">

        <!-- 头部 -->
        <header class="header">
            <div class="header-brand">
                <h1>AM<span>BER</span></h1>
                <span class="est">PALACE · 星耀</span>
            </div>
            <div class="header-cart" id="cartIcon" title="查看点单">
                🍷
                <div class="cart-badge" id="cartBadge">0</div>
            </div>
        </header>

        <!-- 纵向滚动区域 -->
        <div class="scroll-container" id="scrollContainer">
            <!-- 三个分类轮播将由 JS 动态生成 -->
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // =============================================
        // 1. 菜单数据
        // =============================================
        const menuData = [{
            id: 1,
            category: 'Appetizers',
            name: '奥西特拉鲟鱼子酱',
            en: 'Oscietra Caviar',
            desc: '搭配薄饼与法式酸奶油，海洋咸鲜在舌尖绽放',
            price: '¥488',
            imgClass: 'img-1'
        }, {
            id: 2,
            category: 'Appetizers',
            name: '慢煮白芦笋',
            en: 'White Asparagus Velouté',
            desc: '伊比利亚火腿碎，松露泡沫，时令之珍',
            price: '¥328',
            imgClass: 'img-2'
        }, {
            id: 3,
            category: 'Appetizers',
            name: '蓝鳍金枪鱼塔塔',
            en: 'Bluefin Tuna Tartare',
            desc: '芝麻油醋汁，牛油果泥，脆米饼底',
            price: '¥398',
            imgClass: 'img-3'
        }, {
            id: 4,
            category: 'Main Course',
            name: 'M9+ 和牛肋眼',
            en: 'M9+ Wagyu Ribeye',
            desc: '炭火炙烤，搭配黑松露土豆泥与红酒汁',
            price: '¥1,288',
            imgClass: 'img-4'
        }, {
            id: 5,
            category: 'Main Course',
            name: '海螯虾与龙虾',
            en: 'Langoustine & Lobster',
            desc: '香草黄油烤制，佐以藏红花海鲜浓汤',
            price: '¥998',
            imgClass: 'img-5'
        }, {
            id: 6,
            category: 'Main Course',
            name: '脆皮乳鸽',
            en: 'Crispy Pigeon',
            desc: '薰衣草蜂蜜酱，搭配油封时蔬，外酥里嫩',
            price: '¥868',
            imgClass: 'img-6'
        }, {
            id: 7,
            category: 'Main Course',
            name: '银鳕鱼西京烧',
            en: 'Black Cod Saikyo',
            desc: '味噌腌制，配以柚子胡椒与烤时蔬',
            price: '¥728',
            imgClass: 'img-10'
        }, {
            id: 8,
            category: 'Dessert',
            name: '香草千层酥',
            en: 'Vanilla Mille-Feuille',
            desc: '马达加斯加香草荚，焦糖酥皮，覆盆子雪芭',
            price: '¥268',
            imgClass: 'img-7'
        }, {
            id: 9,
            category: 'Dessert',
            name: '巧克力熔岩',
            en: 'Chocolate Fondant',
            desc: '70% 圭亚那黑巧，流心内馅，海盐冰淇淋',
            price: '¥298',
            imgClass: 'img-8'
        }, {
            id: 10,
            category: 'Dessert',
            name: '分子芒果球',
            en: 'Mango Sphere',
            desc: '液氮急冻，椰奶西米露，青柠泡沫',
            price: '¥248',
            imgClass: 'img-9'
        }];

        // =============================================
        // 2. 渲染轮播 (每个分类一个独立轮播)
        // =============================================
        const categories = [
            { key: 'Appetizers', label: '前 菜', en: 'Appetizers' },
            { key: 'Main Course', label: '主 菜', en: 'Main Course' },
            { key: 'Dessert', label: '甜 品', en: 'Dessert' }
        ];

        const container = document.getElementById('scrollContainer');

        // 存储每个轮播的状态
        const carousels = {};

        function renderCarousels() {
            let html = '';
            categories.forEach((cat, catIndex) => {
                const items = menuData.filter(item => item.category === cat.key);
                if (items.length === 0) return;

                // 构建轮播卡片
                let slidesHtml = items.map(item => `
                    <div class="carousel-slide">
                        <div class="menu-item">
                            <div class="item-image ${item.imgClass}"></div>
                            <div class="item-info">
                                <div class="item-name">
                                    ${item.name}
                                    <span class="en">${item.en}</span>
                                </div>
                                <div class="item-price">${item.price}</div>
                            </div>
                            <div class="item-desc">${item.desc}</div>
                            <div class="item-footer">
                                <button class="add-btn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                html += `
                    <div class="category-section" data-category="${cat.key}">
                        <div class="category-title">
                            <h2>${cat.label}</h2>
                            <span class="en-sub">${cat.en}</span>
                        </div>
                        <div class="carousel-container" id="carousel-${cat.key}">
                            <div class="carousel-track">
                                ${slidesHtml}
                            </div>
                        </div>
                        <div class="carousel-controls">
                            <button class="carousel-arrow prev" data-category="${cat.key}">‹</button>
                            <div class="carousel-dots" id="dots-${cat.key}">
                                ${items.map((_, idx) => `<span class="dot ${idx===0?'active':''}" data-index="${idx}"></span>`).join('')}
                            </div>
                            <button class="carousel-arrow next" data-category="${cat.key}">›</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // 初始化每个轮播
            categories.forEach(cat => {
                const key = cat.key;
                const track = document.querySelector(`#carousel-${key} .carousel-track`);
                const slides = track.querySelectorAll('.carousel-slide');
                const dots = document.querySelectorAll(`#dots-${key} .dot`);
                const prevBtn = document.querySelector(`.carousel-arrow.prev[data-category="${key}"]`);
                const nextBtn = document.querySelector(`.carousel-arrow.next[data-category="${key}"]`);
                if (slides.length === 0) return;

                carousels[key] = {
                    current: 0,
                    total: slides.length,
                    track: track,
                    slides: slides,
                    dots: dots,
                    prevBtn: prevBtn,
                    nextBtn: nextBtn,
                    update: function() {
                        const offset = -this.current * 100;
                        this.track.style.transform = `translateX(${offset}%)`;
                        this.dots.forEach((dot, i) => {
                            dot.classList.toggle('active', i === this.current);
                        });
                        if (this.prevBtn) this.prevBtn.disabled = (this.current === 0);
                        if (this.nextBtn) this.nextBtn.disabled = (this.current === this.total - 1);
                    },
                    goTo: function(index) {
                        if (index < 0) index = 0;
                        if (index >= this.total) index = this.total - 1;
                        this.current = index;
                        this.update();
                    },
                    next: function() { if (this.current < this.total - 1) this.goTo(this.current + 1); },
                    prev: function() { if (this.current > 0) this.goTo(this.current - 1); }
                };

                // 绑定事件
                if (prevBtn) prevBtn.addEventListener('click', () => carousels[key].prev());
                if (nextBtn) nextBtn.addEventListener('click', () => carousels[key].next());
                dots.forEach((dot, idx) => {
                    dot.addEventListener('click', () => carousels[key].goTo(idx));
                });

                // 触摸滑动支持
                let startX = 0, isDragging = false;
                const containerEl = document.getElementById(`carousel-${key}`);
                containerEl.addEventListener('pointerdown', (e) => {
                    startX = e.clientX;
                    isDragging = true;
                    containerEl.style.cursor = 'grabbing';
                });
                window.addEventListener('pointermove', (e) => {
                    if (!isDragging) return;
                    const diff = e.clientX - startX;
                    if (Math.abs(diff) > 30) {
                        if (diff > 0) carousels[key].prev();
                        else carousels[key].next();
                        isDragging = false;
                        containerEl.style.cursor = 'default';
                    }
                });
                window.addEventListener('pointerup', () => {
                    if (isDragging) {
                        isDragging = false;
                        containerEl.style.cursor = 'default';
                    }
                });

                // 初始更新
                carousels[key].update();
            });
        }

        renderCarousels();

        // =============================================
        // 3. 购物车逻辑
        // =============================================
        const cart = [];
        const badge = document.getElementById('cartBadge');
        const toast = document.getElementById('toast');
        let toastTimer = null;

        function updateBadge() {
            const count = cart.length;
            badge.textContent = count;
            if (count > 0) {
                badge.classList.remove('pop');
                void badge.offsetWidth;
                badge.classList.add('pop');
            }
        }

        function showToast(msg) {
            toast.innerHTML = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.add-btn');
            if (!btn) return;
            e.stopPropagation();

            const name = btn.dataset.name;
            const price = btn.dataset.price;
            const id = parseInt(btn.dataset.id);

            cart.push({ id, name, price });
            updateBadge();

            // 按钮反馈
            btn.style.transition = 'transform 0.1s';
            btn.style.transform = 'scale(0.6)';
            setTimeout(() => {
                btn.style.transform = 'scale(1.1)';
                setTimeout(() => btn.style.transform = 'scale(1)', 150);
            }, 100);

            showToast(`✦ 已臻选 <span>${name}</span>`);
            console.log('📋 后厨订单:', cart.map(i => `${i.name} (${i.price})`).join(', '));
        });

        document.getElementById('cartIcon').addEventListener('click', () => {
            if (cart.length === 0) {
                showToast('🍷 请先臻选您的菜品');
                return;
            }
            const list = cart.map((item, idx) => `${idx+1}. ${item.name} ${item.price}`).join('\n');
            const total = cart.reduce((sum, item) => sum + parseInt(item.price.replace(/[¥,]/g, '')), 0);
            alert(`📋 后厨已收到订单：\n\n${list}\n\n💰 预估总计：¥${total.toLocaleString()}\n(请至收银台核销)`);
            showToast(`📋 已通知后厨，共 ${cart.length} 道臻品`);
            console.log('✅ 完整订单数据:', JSON.stringify(cart, null, 2));
        });

        // =============================================
        // 4. 粒子背景
        // =============================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(201, 169, 110, ${this.opacity})`;
                    ctx.shadowColor = 'rgba(201, 169, 110, 0.3)';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // =============================================
        // 5. 欢迎提示
        // =============================================
        window.addEventListener('load', () => {
            setTimeout(() => showToast('🍷 欢迎莅临 AMBER 星耀'), 600);
        });
    </script>
</body>
